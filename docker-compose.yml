services:

  backend:
    build: ./backend
    container_name: fastapi
    environment:
      DB_HOST: postgres15
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_SCHEMA: ${DB_SCHEMA}
      DATABASE_URL: postgresql+asyncpg://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
    ports:
      - "8000:8000"
    networks:
      - dashboard_app-network

  frontend:
    build: ./frontend
    container_name: streamlit
    environment:
      API_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    networks:
      - dashboard_app-network

networks:
  dashboard_app-network:
    external: true